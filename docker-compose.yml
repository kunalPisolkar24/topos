version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - ./backend/.env
      - ./backend/.dev.vars 
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network
    depends_on:
      - elasticsearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend 
    networks:
      - app-network

  summary_api:
    image: kunalpisolkar/blog-app:distilbart-1.0
    ports:
      - "5000:5000"
    volumes:
      - ./summary-api:/app
    networks:
      - app-network

  summary_worker:
    build:
      context: ./summary-worker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./summary-worker:/app
    env_file:
      - ./summary-worker/.env
    networks:
      - app-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch-dev
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  esdata:
    driver: local