services:
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-http://localhost:4000/graphql}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
    container_name: ${FRONTEND_CONTAINER:-local-frontend}
    restart: unless-stopped
    ports:
      - "${FRONTEND_EXT_PORT:-3000}:${FRONTEND_INT_PORT:-3000}"
    environment:
      PORT: ${FRONTEND_INT_PORT:-3000}
    depends_on:
      - gateway
    networks:
      - app-network

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
