name: Service - Gateway

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging
    paths:
      - "gateway/**"
      - "services/user/schema.graphql"
      - "services/content/graph/schema.graphqls"
      - "services/search/schema.graphql"
      - ".github/workflows/service-gateway.yaml"
  pull_request:
    branches:
      - main
      - staging
    paths:
      - "gateway/**"
      - "services/user/schema.graphql"
      - "services/content/graph/schema.graphqls"
      - "services/search/schema.graphql"
      - ".github/workflows/service-gateway.yaml"

env:
  DOCKER_IMAGE_NAME: kunalpisolkar/topos-gateway

jobs:
  quality-assurance:
    name: Verify Supergraph Composition
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rover
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> "$GITHUB_PATH"

      - name: Compose Supergraph
        env:
          APOLLO_ELV2_LICENSE: accept
        run: |
          mkdir -p subgraphs
          cp services/user/schema.graphql subgraphs/user.graphql
          cp services/content/graph/schema.graphqls subgraphs/content.graphql
          cp services/search/schema.graphql subgraphs/search.graphql
          cp gateway/supergraph.yaml supergraph.yaml
          rover supergraph compose --config ./supergraph.yaml > /tmp/supergraph.graphql
          test -s /tmp/supergraph.graphql

  build-and-push:
    name: Build & Push Docker Image
    needs: quality-assurance
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max
