services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${AI_SERVICE_CONTAINER:-local-ai-service}
    environment:
      - LIGHTNING_AI_API_KEY=${LIGHTNING_AI_API_KEY}
      - PORT=${AI_SERVICE_INT_PORT:-50051}
      - METRICS_PORT=${AI_METRICS_INT_PORT:-19090}
      - LOG_LEVEL=${AI_LOG_LEVEL:-debug}
      - LIGHTNING_MODEL=${AI_LIGHTNING_MODEL:-}
      - TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-30}
    ports:
      - "${AI_SERVICE_EXT_PORT:-50051}:${AI_SERVICE_INT_PORT:-50051}"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
