services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${AI_SERVICE_CONTAINER}
    environment:
      - LIGHTNING_AI_API_KEY=${LIGHTNING_AI_API_KEY}
      - PORT=${AI_SERVICE_INT_PORT}
      - METRICS_PORT=${AI_METRICS_INT_PORT}
      - LOG_LEVEL=${AI_LOG_LEVEL}
      - LIGHTNING_MODEL=${AI_LIGHTNING_MODEL}
      - TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS}
    ports:
      - "${AI_SERVICE_EXT_PORT}:${AI_SERVICE_INT_PORT}"
      - "${AI_METRICS_BIND_HOST:-127.0.0.1}:${AI_METRICS_EXT_PORT:-19090}:${AI_METRICS_INT_PORT}"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}
