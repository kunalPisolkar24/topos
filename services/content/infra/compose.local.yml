services:
  content-mongo:
    image: mongo:7.0
    container_name: local-content-mongo
    ports:
      - "${CONTENT_MONGO_EXT_PORT:-27017}:${CONTENT_MONGO_INT_PORT:-27017}"
    volumes:
      - content_mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --port ${CONTENT_MONGO_INT_PORT:-27017} --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  content-redis:
    image: redis:7.0-alpine
    container_name: local-content-redis
    command: redis-server --appendonly yes
    ports:
      - "${CONTENT_REDIS_EXT_PORT:-6379}:6379"
    volumes:
      - content_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  content_mongo_data:
  content_redis_data:

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
