include:
  - path: infra/mongo.yml
  - path: infra/redis.yml

services:
  content-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTENT_SERVICE_CONTAINER}
    restart: unless-stopped
    ports:
      - "${CONTENT_SERVICE_EXT_PORT}:${CONTENT_SERVICE_INT_PORT}"
    environment:
      - PORT=${CONTENT_SERVICE_INT_PORT}
      - MONGO_URI=${CONTENT_MONGO_URI}
      - DB_NAME=${CONTENT_DB_NAME}
      - JWT_SECRET=${CONTENT_JWT_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - REDIS_ADDRS=${CONTENT_REDIS_ADDRS}
      - REDIS_MASTER_NAME=${CONTENT_REDIS_MASTER_NAME}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-ai-service:50051}
      - AI_REQUIRED=${CONTENT_AI_REQUIRED:-false}
      - AI_DIAL_TIMEOUT_SECONDS=${CONTENT_AI_DIAL_TIMEOUT_SECONDS:-5}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${CONTENT_SERVICE_INT_PORT}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    depends_on:
      content-mongo-1:
        condition: service_healthy
      content-redis-master:
        condition: service_healthy
      content-redis-sentinel-1:
        condition: service_healthy

  content-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: content-worker
    container_name: ${CONTENT_WORKER_CONTAINER}
    restart: unless-stopped
    command: [ "./content-worker" ]
    ports:
      - "${CONTENT_WORKER_EXT_PORT}:${CONTENT_WORKER_INT_PORT}"
    environment:
      - PORT=${CONTENT_WORKER_INT_PORT}
      - MONGO_URI=${CONTENT_MONGO_URI}
      - DB_NAME=${CONTENT_DB_NAME}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - REDIS_ADDRS=${CONTENT_REDIS_ADDRS}
      - REDIS_MASTER_NAME=${CONTENT_REDIS_MASTER_NAME}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-ai-service:50051}
      - AI_REQUIRED=${CONTENT_AI_REQUIRED:-false}
      - AI_DIAL_TIMEOUT_SECONDS=${CONTENT_AI_DIAL_TIMEOUT_SECONDS:-5}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${CONTENT_WORKER_INT_PORT}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    depends_on:
      content-mongo-1:
        condition: service_healthy
      content-redis-master:
        condition: service_healthy
      content-redis-sentinel-1:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}
