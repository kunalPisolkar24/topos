services:
  content-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTENT_SERVICE_CONTAINER}
    restart: unless-stopped
    ports:
      - "${CONTENT_SERVICE_EXT_PORT}:${CONTENT_SERVICE_INT_PORT}"
    environment:
      - PORT=${CONTENT_SERVICE_INT_PORT}
      - MONGO_URI=${CONTENT_MONGO_URI}
      - DB_NAME=${CONTENT_DB_NAME}
      - JWT_SECRET=${CONTENT_JWT_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - REDIS_ADDRS=${CONTENT_REDIS_ADDRS}
      - REDIS_MASTER_NAME=${CONTENT_REDIS_MASTER_NAME}
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:${CONTENT_SERVICE_INT_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    depends_on:
      content-mongo-1:
        condition: service_healthy
      content-redis-master:
        condition: service_healthy
      content-redis-sentinel-1:
        condition: service_healthy

  content-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTENT_WORKER_CONTAINER}
    restart: unless-stopped
    command: [ "./content-worker" ]
    ports:
      - "${CONTENT_WORKER_EXT_PORT}:${CONTENT_WORKER_INT_PORT}"
    environment:
      - PORT=${CONTENT_WORKER_INT_PORT}
      - MONGO_URI=${CONTENT_MONGO_URI}
      - DB_NAME=${CONTENT_DB_NAME}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - REDIS_ADDRS=${CONTENT_REDIS_ADDRS}
      - REDIS_MASTER_NAME=${CONTENT_REDIS_MASTER_NAME}
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:${CONTENT_WORKER_INT_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    depends_on:
      content-mongo-1:
        condition: service_healthy
      content-redis-master:
        condition: service_healthy
      content-redis-sentinel-1:
        condition: service_healthy

  content-mongo-1:
    image: mongo:7.0
    container_name: ${CONTENT_MONGO_1_CONTAINER}
    command: [ "--replSet", "rs0", "--bind_ip_all", "--port", "${CONTENT_MONGO_INT_PORT}" ]
    ports:
      - "${CONTENT_MONGO_EXT_PORT}:${CONTENT_MONGO_INT_PORT}"
    volumes:
      - content_mongo1_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'${CONTENT_MONGO_1_CONTAINER}:${CONTENT_MONGO_INT_PORT}'},{_id:1,host:'${CONTENT_MONGO_2_CONTAINER}:${CONTENT_MONGO_INT_PORT}'},{_id:2,host:'${CONTENT_MONGO_3_CONTAINER}:${CONTENT_MONGO_INT_PORT}'}]}) }" | mongosh --port ${CONTENT_MONGO_INT_PORT} --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s

  content-mongo-2:
    image: mongo:7.0
    container_name: ${CONTENT_MONGO_2_CONTAINER}
    command: [ "--replSet", "rs0", "--bind_ip_all", "--port", "${CONTENT_MONGO_INT_PORT}" ]
    volumes:
      - content_mongo2_data:/data/db
    networks:
      - app-network

  content-mongo-3:
    image: mongo:7.0
    container_name: ${CONTENT_MONGO_3_CONTAINER}
    command: [ "--replSet", "rs0", "--bind_ip_all", "--port", "${CONTENT_MONGO_INT_PORT}" ]
    volumes:
      - content_mongo3_data:/data/db
    networks:
      - app-network

  content-redis-master:
    image: redis:7.0-alpine
    container_name: ${CONTENT_REDIS_MASTER_CONTAINER}
    command: redis-server --appendonly yes --repl-diskless-load on-empty-db --repl-diskless-sync yes
    restart: unless-stopped
    volumes:
      - content_redis_master_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  content-redis-replica:
    image: redis:7.0-alpine
    container_name: ${CONTENT_REDIS_REPLICA_CONTAINER}
    command: redis-server --replicaof ${CONTENT_REDIS_MASTER_CONTAINER} 6379 --appendonly yes --repl-diskless-load on-empty-db --repl-diskless-sync yes
    restart: unless-stopped
    volumes:
      - content_redis_replica_data:/data
    depends_on:
      content-redis-master:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  content-redis-sentinel-1:
    <<: *sentinel-common
    container_name: ${CONTENT_REDIS_SENTINEL_1_CONTAINER}
    ports:
      - "${CONTENT_REDIS_SENTINEL_EXT_PORT}:${CONTENT_REDIS_SENTINEL_INT_PORT}"

  content-redis-sentinel-2:
    <<: *sentinel-common
    container_name: ${CONTENT_REDIS_SENTINEL_2_CONTAINER}

  content-redis-sentinel-3:
    <<: *sentinel-common
    container_name: ${CONTENT_REDIS_SENTINEL_3_CONTAINER}

x-sentinel-common: &sentinel-common
  image: redis:7.0-alpine
  restart: unless-stopped
  command: >
    sh -c "echo 'port 26379' > /tmp/sentinel.conf &&
    echo 'sentinel monitor ${CONTENT_REDIS_MASTER_NAME} ${CONTENT_REDIS_MASTER_CONTAINER} 6379 2' >> /tmp/sentinel.conf &&
    echo 'sentinel down-after-milliseconds ${CONTENT_REDIS_MASTER_NAME} 3000' >> /tmp/sentinel.conf &&
    echo 'sentinel failover-timeout ${CONTENT_REDIS_MASTER_NAME} 60000' >> /tmp/sentinel.conf &&
    echo 'sentinel parallel-syncs ${CONTENT_REDIS_MASTER_NAME} 1' >> /tmp/sentinel.conf &&
    echo 'sentinel resolve-hostnames yes' >> /tmp/sentinel.conf &&
    redis-sentinel /tmp/sentinel.conf"
  networks:
    - app-network
  depends_on:
    content-redis-master:
      condition: service_healthy
    content-redis-replica:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "${CONTENT_REDIS_SENTINEL_INT_PORT}", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}

volumes:
  content_mongo1_data:
  content_mongo2_data:
  content_mongo3_data:
  content_redis_master_data:
  content_redis_replica_data:
