name: topos-content-loadtest

x-content-service-env: &content-service-env
  PORT: ${CONTENT_SERVICE_INT_PORT:-4002}
  MONGO_URI: ${CONTENT_MONGO_URI:-mongodb://content-mongo:27017}
  DB_NAME: ${CONTENT_DB_NAME:-blog_content}
  JWT_SECRET: ${CONTENT_JWT_SECRET:?CONTENT_JWT_SECRET is required}
  KAFKA_BROKERS: content-kafka:9092
  KAFKA_TOPIC: posts
  REDIS_URL: redis://content-redis:6379
  REDIS_MASTER_NAME: ""
  AI_SERVICE_URL: ai-service:50051
  AI_REQUIRED: false
  AI_DIAL_TIMEOUT_SECONDS: 1

x-content-seed-env: &content-seed-env
  MONGO_URI: ${CONTENT_MONGO_URI:-mongodb://content-mongo:27017}
  DB_NAME: ${CONTENT_DB_NAME:-blog_content}
  JWT_SECRET: ${CONTENT_JWT_SECRET:?CONTENT_JWT_SECRET is required}
  SEED_POST_COUNT: ${SEED_POST_COUNT:-5000}
  SEED_OUTPUT_DIR: /load-tests/seed-k6/seed_data

services:
  content-mongo:
    image: mongo:7.0
    container_name: loadtest-content-mongo
    restart: unless-stopped
    command:
      - mongod
      - --syncdelay=0
      - --quiet
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${MONGO_MEM:-1G}
        reservations:
          memory: 512M

  content-redis:
    image: redis:7-alpine
    container_name: loadtest-content-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save ""
      - --appendonly no
      - --maxmemory ${REDIS_MEM:-512mb}
      - --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM:-640M}
        reservations:
          memory: 128M

  content-kafka:
    image: apache/kafka:3.7.0
    container_name: loadtest-content-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://content-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@content-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: topos-loadtest-cluster
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 10
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${KAFKA_MEM:-768M}
        reservations:
          memory: 256M

  content-init-kafka:
    image: apache/kafka:3.7.0
    container_name: loadtest-content-init-kafka
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server content-kafka:9092 --create --if-not-exists --topic posts --partitions 6 --replication-factor 1
      "
    depends_on:
      content-kafka:
        condition: service_healthy
    networks:
      - loadtest-net

  content-seed:
    build:
      context: ..
      dockerfile: Dockerfile
      target: seed
    container_name: loadtest-content-seed
    restart: "no"
    environment: *content-seed-env
    depends_on:
      content-mongo:
        condition: service_healthy
    volumes:
      - ./k6:/load-tests/seed-k6:rw
    networks:
      - loadtest-net

  content-service:
    build:
      context: ..
      dockerfile: Dockerfile
      target: content-service
    container_name: loadtest-content-service
    restart: unless-stopped
    environment: *content-service-env
    depends_on:
      content-mongo:
        condition: service_healthy
      content-redis:
        condition: service_healthy
      content-kafka:
        condition: service_healthy
      content-init-kafka:
        condition: service_completed_successfully
      content-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${CONTENT_SERVICE_INT_PORT:-4002}/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${SVC_MEM:-768M}
        reservations:
          memory: 256M

  content-worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: content-worker
    container_name: loadtest-content-worker
    restart: unless-stopped
    environment:
      PORT: ${CONTENT_WORKER_INT_PORT:-4012}
      MONGO_URI: ${CONTENT_MONGO_URI:-mongodb://content-mongo:27017}
      DB_NAME: ${CONTENT_DB_NAME:-blog_content}
      JWT_SECRET: ${CONTENT_JWT_SECRET:?CONTENT_JWT_SECRET is required}
      KAFKA_BROKERS: content-kafka:9092
      KAFKA_TOPIC: posts
      KAFKA_CONSUMER_GROUP_ID: content-summary-worker-group
      REDIS_URL: redis://content-redis:6379
      REDIS_MASTER_NAME: ""
      AI_SERVICE_URL: ai-service:50051
      AI_REQUIRED: false
      AI_DIAL_TIMEOUT_SECONDS: 1
    depends_on:
      content-mongo:
        condition: service_healthy
      content-kafka:
        condition: service_healthy
      content-init-kafka:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${CONTENT_WORKER_INT_PORT:-4012}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEM:-512M}
        reservations:
          memory: 128M

  k6:
    image: grafana/k6:latest
    container_name: loadtest-k6
    restart: "no"
    command: ["run", "--summary-trend-stats=avg,med,p(90),p(95),p(99),max", "/load-tests/k6/${SCRIPT:-mixed}.js"]
    environment:
      TARGET: http://content-service:${CONTENT_SERVICE_INT_PORT:-4002}
      VUS: ${VUS:-20}
      DURATION: ${DURATION:-30s}
      RPS: ${RPS:-50}
      WEIGHTS: ${WEIGHTS:-reads:50,post:20,tag:10,bytag:10,create:10}
    depends_on:
      content-service:
        condition: service_healthy
    volumes:
      - ./k6:/load-tests/k6:ro
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${K6_MEM:-384M}
        reservations:
          memory: 64M

networks:
  loadtest-net:
    name: content-loadtest-net
    driver: bridge
