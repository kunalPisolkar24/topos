include:
  - path: infra/compose.local.yml

services:
  content-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: content-service
    container_name: ${CONTENT_SERVICE_CONTAINER:-local-content-service}
    restart: unless-stopped
    ports:
      - "${CONTENT_SERVICE_EXT_PORT:-4002}:${CONTENT_SERVICE_INT_PORT:-4002}"
    environment:
      - PORT=${CONTENT_SERVICE_INT_PORT:-4002}
      - MONGO_URI=${CONTENT_MONGO_URI:-mongodb://local-content-mongo:27017}
      - DB_NAME=${CONTENT_DB_NAME:-blog_content}
      - JWT_SECRET=${CONTENT_JWT_SECRET:-local-dev-secret}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka-1:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-posts}
      - REDIS_URL=${CONTENT_REDIS_URL:-redis://local-content-redis:6379}
      - REDIS_MASTER_NAME=
      - AI_SERVICE_URL=${AI_SERVICE_URL:-ai-service:50051}
      - AI_REQUIRED=${CONTENT_AI_REQUIRED:-false}
      - AI_DIAL_TIMEOUT_SECONDS=${CONTENT_AI_DIAL_TIMEOUT_SECONDS:-5}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${CONTENT_SERVICE_INT_PORT:-4002}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    depends_on:
      content-mongo:
        condition: service_healthy
      content-redis:
        condition: service_healthy

  content-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: content-worker
    container_name: ${CONTENT_WORKER_CONTAINER:-local-content-worker}
    restart: unless-stopped
    command: [ "./content-worker" ]
    ports:
      - "${CONTENT_WORKER_EXT_PORT:-4012}:${CONTENT_WORKER_INT_PORT:-4012}"
    environment:
      - PORT=${CONTENT_WORKER_INT_PORT:-4012}
      - MONGO_URI=${CONTENT_MONGO_URI:-mongodb://local-content-mongo:27017}
      - DB_NAME=${CONTENT_DB_NAME:-blog_content}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka-1:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-posts}
      - REDIS_URL=${CONTENT_REDIS_URL:-redis://local-content-redis:6379}
      - REDIS_MASTER_NAME=
      - AI_SERVICE_URL=${AI_SERVICE_URL:-ai-service:50051}
      - AI_REQUIRED=${CONTENT_AI_REQUIRED:-false}
      - AI_DIAL_TIMEOUT_SECONDS=${CONTENT_AI_DIAL_TIMEOUT_SECONDS:-5}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${CONTENT_WORKER_INT_PORT:-4012}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    depends_on:
      content-mongo:
        condition: service_healthy
      content-redis:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
