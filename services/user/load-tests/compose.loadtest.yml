name: topos-user-loadtest

x-user-service-env: &user-service-env
  PORT: ${USER_SERVICE_INT_PORT:-4001}
  JWT_SECRET: ${USER_JWT_SECRET:?USER_JWT_SECRET is required}
  DATABASE_URL: ${USER_DATABASE_URL:-postgresql://${USER_POSTGRES_USER:-topos_user}:${USER_POSTGRES_PASSWORD:-topos_pass}@user-postgres:${USER_POSTGRES_INT_PORT:-5432}/${USER_POSTGRES_DB:-topos_users}}
  REDIS_URL: redis://user-redis:6379
  NODE_ENV: production
  USER_CACHE_TTL_MS: ${USER_CACHE_TTL_MS:-3600000}
  USER_MISSING_CACHE_TTL_MS: ${USER_MISSING_CACHE_TTL_MS:-60000}

x-user-migrate-env: &user-migrate-env
  DATABASE_URL_MIGRATE: ${USER_DATABASE_URL_MIGRATE:-${USER_DATABASE_URL:-postgresql://${USER_POSTGRES_USER:-topos_user}:${USER_POSTGRES_PASSWORD:-topos_pass}@user-postgres:${USER_POSTGRES_INT_PORT:-5432}/${USER_POSTGRES_DB:-topos_users}}}

x-user-seed-env: &user-seed-env
  DATABASE_URL: ${USER_DATABASE_URL:-postgresql://${USER_POSTGRES_USER:-topos_user}:${USER_POSTGRES_PASSWORD:-topos_pass}@user-postgres:${USER_POSTGRES_INT_PORT:-5432}/${USER_POSTGRES_DB:-topos_users}}
  JWT_SECRET: ${USER_JWT_SECRET:?USER_JWT_SECRET is required}
  JWT_ISSUER: ${JWT_ISSUER:-user-service}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-topos}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
  SEED_USER_COUNT: ${SEED_USER_COUNT:-5000}
  SEED_OUTPUT_DIR: /out
  NODE_ENV: production

services:
  user-postgres:
    image: postgres:15-alpine
    container_name: loadtest-user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER:-topos_user}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD:-topos_pass}
      POSTGRES_DB: ${USER_POSTGRES_DB:-topos_users}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=8MB
      - -c
      - max_connections=200
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
    volumes:
      - user_lt_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER:-topos_user} -d ${USER_POSTGRES_DB:-topos_users}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${PG_MEM:-1G}
        reservations:
          memory: 512M

  user-redis:
    image: redis:7-alpine
    container_name: loadtest-user-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - ${REDIS_MEM:-512mb}
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM:-640M}
        reservations:
          memory: 128M

  user-migrate:
    build:
      context: ..
      dockerfile: Dockerfile
      target: migrator
    container_name: loadtest-user-migrate
    restart: "no"
    environment: *user-migrate-env
    depends_on:
      user-postgres:
        condition: service_healthy
    networks:
      - loadtest-net

  user-seed:
    build:
      context: ..
      dockerfile: Dockerfile
      target: seed
    container_name: loadtest-user-seed
    restart: "no"
    environment: *user-seed-env
    depends_on:
      user-migrate:
        condition: service_completed_successfully
    volumes:
      - seed_out:/out
    networks:
      - loadtest-net

  user-service:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    container_name: loadtest-user-service
    restart: unless-stopped
    environment: *user-service-env
    depends_on:
      user-postgres:
        condition: service_healthy
      user-redis:
        condition: service_healthy
      user-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:${USER_SERVICE_INT_PORT:-4001}/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${SVC_MEM:-768M}
        reservations:
          memory: 256M

  k6:
    image: grafana/k6:latest
    container_name: loadtest-k6
    restart: "no"
    command: ["run", "--summary-trend-stats=avg,med,p(90),p(95),p(99),max", "/load-tests/k6/${SCRIPT:-mixed}.js"]
    environment:
      TARGET: http://user-service:${USER_SERVICE_INT_PORT:-4001}
      SEED_OUTPUT_DIR: /out
      VUS: ${VUS:-20}
      DURATION: ${DURATION:-30s}
      RPS: ${RPS:-50}
      WEIGHTS: ${WEIGHTS:-reads:50,user:20,me:10,signin:10,signup:10}
    depends_on:
      user-service:
        condition: service_healthy
    volumes:
      - ./k6:/load-tests/k6:ro
      - seed_out:/out:ro
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${K6_MEM:-384M}
        reservations:
          memory: 64M

volumes:
  user_lt_pg_data:
  seed_out:

networks:
  loadtest-net:
    name: loadtest-net
    driver: bridge
