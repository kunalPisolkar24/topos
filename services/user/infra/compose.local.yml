services:
  user-postgres:
    image: postgres:15-alpine
    container_name: local-user-postgres
    restart: unless-stopped
    ports:
      - "${USER_POSTGRES_EXT_PORT:-5432}:${USER_POSTGRES_INT_PORT:-5432}"
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER:-topos_user}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD:-topos_pass}
      POSTGRES_DB: ${USER_POSTGRES_DB:-topos_users}
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER:-topos_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  user-redis:
    image: redis:7-alpine
    container_name: local-user-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${USER_REDIS_EXT_PORT:-6380}:6379"
    volumes:
      - user_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  user_postgres_data:
  user_redis_data:

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
