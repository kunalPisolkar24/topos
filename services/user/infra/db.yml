services:
  user-postgres-primary:
    image: postgres:15-alpine
    container_name: ${USER_POSTGRES_PRIMARY_CONTAINER}
    restart: unless-stopped
    ports:
      - "${USER_POSTGRES_PRIMARY_BIND_HOST:-127.0.0.1}:${USER_POSTGRES_PRIMARY_EXT_PORT}:${USER_POSTGRES_PRIMARY_INT_PORT}"
    environment:
      - POSTGRES_USER=${USER_POSTGRES_USER}
      - POSTGRES_PASSWORD=${USER_POSTGRES_PASSWORD}
      - POSTGRES_DB=${USER_POSTGRES_DB}
      - USER_POSTGRES_APP_CIDR=${USER_POSTGRES_APP_CIDR:-172.18.0.0/16}
      - USER_POSTGRES_REPLICATION_USER=${USER_POSTGRES_REPLICATION_USER}
      - USER_POSTGRES_REPLICATION_CIDR=${USER_POSTGRES_REPLICATION_CIDR:-172.18.0.0/16}
    entrypoint:
      - /bin/sh
      - /usr/local/bin/start-primary.sh
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./postgres/start-primary.sh:/usr/local/bin/start-primary.sh:ro
      - ./postgres/render-pg-hba.sh:/usr/local/bin/render-pg-hba.sh:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf.template:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  user-postgres-replication-setup:
    image: postgres:15-alpine
    container_name: user-postgres-replication-setup
    restart: "no"
    depends_on:
      user-postgres-primary:
        condition: service_healthy
    environment:
      - PGPASSWORD=${USER_POSTGRES_PASSWORD}
      - USER_POSTGRES_USER=${USER_POSTGRES_USER}
      - USER_POSTGRES_PRIMARY_INT_PORT=${USER_POSTGRES_PRIMARY_INT_PORT}
      - USER_POSTGRES_REPLICATION_USER=${USER_POSTGRES_REPLICATION_USER}
      - USER_POSTGRES_REPLICATION_PASSWORD=${USER_POSTGRES_REPLICATION_PASSWORD}
    entrypoint:
      - /bin/sh
      - /usr/local/bin/configure-replication-role.sh
    volumes:
      - ./postgres/configure-replication-role.sh:/usr/local/bin/configure-replication-role.sh:ro
    networks:
      - app-network

  user-postgres-replica:
    image: postgres:15-alpine
    container_name: ${USER_POSTGRES_REPLICA_CONTAINER}
    restart: unless-stopped
    ports:
      - "${USER_POSTGRES_REPLICA_BIND_HOST:-127.0.0.1}:${USER_POSTGRES_REPLICA_EXT_PORT}:${USER_POSTGRES_REPLICA_INT_PORT}"
    depends_on:
      user-postgres-primary:
        condition: service_healthy
      user-postgres-replication-setup:
        condition: service_completed_successfully
    environment:
      - PGPASSWORD=${USER_POSTGRES_REPLICATION_PASSWORD}
      - USER_POSTGRES_PRIMARY_INT_PORT=${USER_POSTGRES_PRIMARY_INT_PORT}
      - USER_POSTGRES_REPLICATION_USER=${USER_POSTGRES_REPLICATION_USER}
    entrypoint:
      - /bin/sh
      - /usr/local/bin/bootstrap-replica.sh
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./postgres/bootstrap-replica.sh:/usr/local/bin/bootstrap-replica.sh:ro
    networks:
      - app-network

volumes:
  postgres_primary_data:
  postgres_replica_data:

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}
