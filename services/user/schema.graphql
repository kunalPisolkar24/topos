extend schema @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key"])

enum CacheControlScope {
  PUBLIC
  PRIVATE
}

directive @cacheControl(
  maxAge: Int
  scope: CacheControlScope
  inheritMaxAge: Boolean
) on FIELD_DEFINITION | OBJECT | INTERFACE | UNION

type User @key(fields: "id") {
  id: ID!
  username: String!
  email: String!
  name: String
  bio: String
  avatarUrl: String
  bannerUrl: String
  createdAt: String!
}

type AuthPayload {
  token: String!
  user: User!
}

type Query {
  me: User @cacheControl(maxAge: 0)
  user(id: ID!): User @cacheControl(maxAge: 60, scope: PRIVATE)
  users(limit: Int = 10, cursor: ID): [User!]! @cacheControl(maxAge: 60, scope: PUBLIC)
}

type Mutation {
  signup(email: String!, username: String!, password: String!): AuthPayload!
  signin(email: String!, password: String!): AuthPayload!
  updateProfile(
    name: String
    bio: String
    avatarUrl: String
    bannerUrl: String
  ): User!
}
