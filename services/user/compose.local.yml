services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${USER_SERVICE_CONTAINER:-local-user-service}
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_EXT_PORT:-4001}:${USER_SERVICE_INT_PORT:-4001}"
    environment:
      PORT: ${USER_SERVICE_INT_PORT:-4001}
      JWT_SECRET: ${USER_JWT_SECRET:-local-dev-secret}
      DATABASE_URL: ${USER_DATABASE_URL:-postgresql://topos_user:topos_pass@local-user-postgres:5432/topos_users}
      NODE_ENV: development
      REDIS_URL: ${USER_REDIS_URL:-redis://local-user-redis:6379}
      USER_CACHE_TTL_MS: ${USER_CACHE_TTL_MS:-3600000}
      USER_MISSING_CACHE_TTL_MS: ${USER_MISSING_CACHE_TTL_MS:-60000}
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:${USER_SERVICE_INT_PORT:-4001}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    depends_on:
      user-postgres:
        condition: service_healthy
      user-redis:
        condition: service_healthy

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
