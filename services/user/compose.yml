include:
  - path: infra/db.yml
  - path: infra/redis.yml

x-user-service-env: &user-service-env
  PORT: ${USER_SERVICE_INT_PORT:?USER_SERVICE_INT_PORT is required}
  JWT_SECRET: ${USER_JWT_SECRET:?USER_JWT_SECRET is required}
  DATABASE_URL: ${USER_DATABASE_URL:?USER_DATABASE_URL is required}
  DATABASE_URL_REPLICA: ${USER_DATABASE_URL_REPLICA:-postgresql://${USER_POSTGRES_USER}:${USER_POSTGRES_PASSWORD}@${USER_POSTGRES_REPLICA_CONTAINER}:${USER_POSTGRES_REPLICA_INT_PORT}/${USER_POSTGRES_DB}}
  DATABASE_URL_MIGRATE: ${USER_DATABASE_URL_MIGRATE:-${USER_DATABASE_URL}}
  NODE_ENV: ${USER_NODE_ENV:-production}
  REDIS_URL: ${USER_REDIS_URL:-}
  REDIS_MASTER_NAME: ${USER_REDIS_MASTER_NAME:-mymaster}
  REDIS_SENTINELS: ${USER_REDIS_SENTINELS:-${USER_REDIS_SENTINEL_1_CONTAINER}:${USER_REDIS_SENTINEL_INT_PORT},${USER_REDIS_SENTINEL_2_CONTAINER}:${USER_REDIS_SENTINEL_INT_PORT},${USER_REDIS_SENTINEL_3_CONTAINER}:${USER_REDIS_SENTINEL_INT_PORT}}
  REDIS_PASSWORD: ${USER_REDIS_PASSWORD:-}
  USER_CACHE_TTL_MS: ${USER_CACHE_TTL_MS:-3600000}
  USER_MISSING_CACHE_TTL_MS: ${USER_MISSING_CACHE_TTL_MS:-60000}

x-user-migrate-env: &user-migrate-env
  DATABASE_URL_MIGRATE: ${USER_DATABASE_URL_MIGRATE:-${USER_DATABASE_URL}}

services:
  user-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: user-migrate
    restart: "no"
    environment: *user-migrate-env
    depends_on:
      user-postgres-primary:
        condition: service_healthy
    networks:
      - app-network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ${USER_SERVICE_CONTAINER:?USER_SERVICE_CONTAINER is required}
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_EXT_PORT:?USER_SERVICE_EXT_PORT is required}:${USER_SERVICE_INT_PORT:?USER_SERVICE_INT_PORT is required}"
    environment: *user-service-env
    depends_on:
      user-migrate:
        condition: service_completed_successfully
      user-postgres-primary:
        condition: service_healthy
      user-redis-sentinel-1:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:${USER_SERVICE_INT_PORT}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}
