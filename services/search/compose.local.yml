include:
  - path: infra/compose.local.yml

services:
  search-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SEARCH_API_CONTAINER:-local-search-api}
    command: npm run start:api
    ports:
      - "${SEARCH_API_EXT_PORT:-4003}:${SEARCH_API_INT_PORT:-4003}"
    environment:
      - API_PORT=${SEARCH_API_INT_PORT:-4003}
      - NODE_ENV=development
      - REDIS_URL=${SEARCH_REDIS_URL:-redis://local-search-redis:6379}
      - ELASTICSEARCH_URL=${SEARCH_ES_URL:-http://local-search-es:9200}
    depends_on:
      search-es:
        condition: service_healthy
      search-redis:
        condition: service_healthy
    networks:
      - app-network

  search-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${SEARCH_WORKER_CONTAINER:-local-search-worker}
    command: npm run start:worker
    ports:
      - "${SEARCH_WORKER_EXT_PORT:-7091}:${SEARCH_WORKER_INT_PORT:-7091}"
    environment:
      - NODE_ENV=development
      - WORKER_METRICS_PORT=${SEARCH_WORKER_INT_PORT:-7091}
      - KAFKA_BROKER=${KAFKA_BROKERS:-kafka-1:9092}
      - KAFKA_GROUP_ID=${SEARCH_KAFKA_GROUP_ID:-search-workers-group}
      - KAFKA_CLIENT_ID=${SEARCH_KAFKA_CLIENT_ID:-search-service}
      - ELASTICSEARCH_URL=${SEARCH_ES_URL:-http://local-search-es:9200}
      - REDIS_URL=${SEARCH_REDIS_URL:-redis://local-search-redis:6379}
    depends_on:
      search-es:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
