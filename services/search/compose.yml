services:
  search-api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: ${SEARCH_API_CONTAINER}
    command: npm run start:api
    ports:
      - "${SEARCH_API_EXT_PORT}:${SEARCH_API_INT_PORT}"
    environment:
      - PORT=${SEARCH_API_INT_PORT}
      - NODE_ENV=${SEARCH_NODE_ENV}
      - REDIS_SENTINEL_HOSTS=${SEARCH_REDIS_SENTINEL_HOSTS}
      - REDIS_MASTER_NAME=${SEARCH_REDIS_MASTER_NAME}
      - ELASTICSEARCH_URL=${SEARCH_ES_URL}
    depends_on:
      search-redis-sentinel-1:
        condition: service_healthy
      search-redis-sentinel-2:
        condition: service_healthy
      search-redis-sentinel-3:
        condition: service_healthy
      search-es01:
        condition: service_healthy
    networks:
      - app-network

  search-worker:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: ${SEARCH_WORKER_CONTAINER}
    command: npm run start:worker
    ports:
      - "${SEARCH_WORKER_EXT_PORT}:${SEARCH_WORKER_INT_PORT}"
    environment:
      - NODE_ENV=${SEARCH_NODE_ENV}
      - WORKER_METRICS_PORT=${SEARCH_WORKER_INT_PORT}
      - KAFKA_BROKER=${KAFKA_BROKERS}
      - KAFKA_GROUP_ID=${SEARCH_KAFKA_GROUP_ID}
      - KAFKA_CLIENT_ID=${SEARCH_KAFKA_CLIENT_ID}
      - ELASTICSEARCH_URL=${SEARCH_ES_URL}
      - REDIS_SENTINEL_HOSTS=${SEARCH_REDIS_SENTINEL_HOSTS}
      - REDIS_MASTER_NAME=${SEARCH_REDIS_MASTER_NAME}
    depends_on:
      search-es01:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}
