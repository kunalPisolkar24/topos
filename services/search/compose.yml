include:
  - path: infra/search-cache.yml
  - path: infra/search-db.yml

x-search-base-env: &search-base-env
  NODE_ENV: ${SEARCH_NODE_ENV:-production}
  ELASTICSEARCH_URL: ${SEARCH_ES_URL:?SEARCH_ES_URL is required}
  ELASTICSEARCH_INDEX: ${SEARCH_ELASTICSEARCH_INDEX:-posts}
  ES_TLS_REJECT_UNAUTHORIZED: ${SEARCH_ES_TLS_REJECT_UNAUTHORIZED:-true}
  ES_REFRESH_POLICY: ${SEARCH_ES_REFRESH_POLICY:-wait_for}
  ES_REQUEST_TIMEOUT_MS: ${SEARCH_ES_REQUEST_TIMEOUT_MS:-30000}
  ES_MAX_RETRIES: ${SEARCH_ES_MAX_RETRIES:-3}
  BULK_CHUNK_SIZE: ${SEARCH_BULK_CHUNK_SIZE:-1000}
  REDIS_URL: ${SEARCH_REDIS_URL:-}
  REDIS_SENTINEL_HOSTS: ${SEARCH_REDIS_SENTINEL_HOSTS:-}
  REDIS_MASTER_NAME: ${SEARCH_REDIS_MASTER_NAME:-mymaster}
  REDIS_PASSWORD: ${SEARCH_REDIS_PASSWORD:-}
  REDIS_SENTINEL_PASSWORD: ${SEARCH_REDIS_SENTINEL_PASSWORD:-}
  REDIS_SENTINEL_TLS: ${SEARCH_REDIS_SENTINEL_TLS:-false}
  CACHE_DEFAULT_TTL_SECONDS: ${SEARCH_CACHE_DEFAULT_TTL_SECONDS:-120}
  MAX_QUERY_LENGTH: ${SEARCH_MAX_QUERY_LENGTH:-512}
  SHUTDOWN_TIMEOUT_MS: ${SEARCH_SHUTDOWN_TIMEOUT_MS:-15000}
  LOG_LEVEL: ${SEARCH_LOG_LEVEL:-}
  SERVICE_NAME: ${SEARCH_SERVICE_NAME:-search-service}
  SERVICE_VERSION: ${SEARCH_SERVICE_VERSION:-0.0.0}

services:
  search-api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: ${SEARCH_API_CONTAINER:?SEARCH_API_CONTAINER is required}
    command: npm run start:api
    ports:
      - "${SEARCH_API_EXT_PORT:?SEARCH_API_EXT_PORT is required}:${SEARCH_API_INT_PORT:?SEARCH_API_INT_PORT is required}"
    environment:
      <<: *search-base-env
      API_PORT: ${SEARCH_API_INT_PORT:?SEARCH_API_INT_PORT is required}
      CORS_ORIGINS: ${SEARCH_CORS_ORIGINS:-}
      AUTH_ENABLED: ${SEARCH_AUTH_ENABLED:-false}
      AUTH_JWKS_URI: ${SEARCH_AUTH_JWKS_URI:-}
      AUTH_AUDIENCE: ${SEARCH_AUTH_AUDIENCE:-}
      AUTH_ISSUER: ${SEARCH_AUTH_ISSUER:-}
      AUTH_ALGORITHMS: ${SEARCH_AUTH_ALGORITHMS:-RS256}
      AUTH_CACHE_MAX_AGE_MS: ${SEARCH_AUTH_CACHE_MAX_AGE_MS:-600000}
      AUTH_CLOCK_TOLERANCE_SEC: ${SEARCH_AUTH_CLOCK_TOLERANCE_SEC:-5}
      METRICS_BASIC_AUTH: ${SEARCH_METRICS_BASIC_AUTH:-}
      HTTP_BODY_LIMIT_KB: ${SEARCH_HTTP_BODY_LIMIT_KB:-256}
      HTTP_TRUST_PROXY: ${SEARCH_HTTP_TRUST_PROXY:-false}
    depends_on:
      search-redis-sentinel-1:
        condition: service_healthy
      search-redis-sentinel-2:
        condition: service_healthy
      search-redis-sentinel-3:
        condition: service_healthy
      search-es01:
        condition: service_healthy
    networks:
      - app-network

  search-worker:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: ${SEARCH_WORKER_CONTAINER:?SEARCH_WORKER_CONTAINER is required}
    command: npm run start:worker
    ports:
      - "${SEARCH_WORKER_EXT_PORT:?SEARCH_WORKER_EXT_PORT is required}:${SEARCH_WORKER_INT_PORT:?SEARCH_WORKER_INT_PORT is required}"
    environment:
      <<: *search-base-env
      WORKER_METRICS_PORT: ${SEARCH_WORKER_INT_PORT:?SEARCH_WORKER_INT_PORT is required}
      KAFKA_BROKER: ${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      KAFKA_CLIENT_ID: ${SEARCH_KAFKA_CLIENT_ID:-search-service}
      KAFKA_GROUP_ID: ${SEARCH_KAFKA_GROUP_ID:-search-workers-group}
      TOPIC_POSTS: ${SEARCH_TOPIC_POSTS:-posts}
      TOPIC_DLQ: ${SEARCH_TOPIC_DLQ:-posts.dlq}
      KAFKA_FROM_BEGINNING: ${SEARCH_KAFKA_FROM_BEGINNING:-false}
      KAFKA_PARTITIONS_CONCURRENT: ${SEARCH_KAFKA_PARTITIONS_CONCURRENT:-3}
      KAFKA_SESSION_TIMEOUT_MS: ${SEARCH_KAFKA_SESSION_TIMEOUT_MS:-30000}
      KAFKA_HEARTBEAT_INTERVAL_MS: ${SEARCH_KAFKA_HEARTBEAT_INTERVAL_MS:-3000}
    depends_on:
      search-es01:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}
