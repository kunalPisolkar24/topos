services:
  search-api:
    build:
      context: ./services/search
      dockerfile: Dockerfile
    container_name: search-api
    command: npm run start:api
    ports:
      - "4003:4003"
    env_file:
      - .env
    environment:
      - PORT=4003
      - NODE_ENV=production
      - REDIS_SENTINEL_HOSTS=search-redis-sentinel-1:26379,search-redis-sentinel-2:26379,search-redis-sentinel-3:26379
      - REDIS_MASTER_NAME=searchmaster
      - ELASTICSEARCH_URL=http://es01:9200
    depends_on:
      search-redis-sentinel-1:
        condition: service_healthy
      search-redis-sentinel-2:
        condition: service_healthy
      search-redis-sentinel-3:
        condition: service_healthy
      es01:
        condition: service_healthy
    networks:
      - app-network

  search-worker:
    build:
      context: ./services/search
      dockerfile: Dockerfile
    container_name: search-worker
    command: npm run start:worker
    ports:
      - "7091:7091"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WORKER_METRICS_PORT=7091
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_GROUP_ID=search-workers-group
      - KAFKA_CLIENT_ID=search-worker-1
      - ELASTICSEARCH_URL=http://es01:9200
      - REDIS_SENTINEL_HOSTS=search-redis-sentinel-1:26379,search-redis-sentinel-2:26379,search-redis-sentinel-3:26379
      - REDIS_MASTER_NAME=searchmaster
    depends_on:
      es01:
        condition: service_healthy
    networks:
      - app-network