name: topos-search-loadtest

x-search-api-env: &search-api-env
  NODE_ENV: production
  API_PORT: ${SEARCH_API_INT_PORT:-4003}
  ELASTICSEARCH_URL: http://search-es:${SEARCH_ES_INT_PORT:-9200}
  ELASTICSEARCH_INDEX: ${SEARCH_ELASTICSEARCH_INDEX:-posts}
  ES_TLS_REJECT_UNAUTHORIZED: false
  ES_REFRESH_POLICY: false
  ES_REQUEST_TIMEOUT_MS: ${SEARCH_ES_REQUEST_TIMEOUT_MS:-30000}
  ES_MAX_RETRIES: ${SEARCH_ES_MAX_RETRIES:-3}
  REDIS_URL: redis://search-redis:6379
  CACHE_DEFAULT_TTL_SECONDS: ${SEARCH_CACHE_DEFAULT_TTL_SECONDS:-120}
  MAX_QUERY_LENGTH: ${SEARCH_MAX_QUERY_LENGTH:-512}
  SHUTDOWN_TIMEOUT_MS: ${SEARCH_SHUTDOWN_TIMEOUT_MS:-15000}
  LOG_LEVEL: ${SEARCH_LOG_LEVEL:-}
  SERVICE_NAME: ${SEARCH_SERVICE_NAME:-search-service}
  SERVICE_VERSION: ${SEARCH_SERVICE_VERSION:-0.0.0}
  CORS_ORIGINS: ""
  AUTH_ENABLED: false
  HTTP_BODY_LIMIT_KB: ${SEARCH_HTTP_BODY_LIMIT_KB:-256}
  HTTP_TRUST_PROXY: false

x-search-seed-env: &search-seed-env
  ELASTICSEARCH_URL: http://search-es:${SEARCH_ES_INT_PORT:-9200}
  ELASTICSEARCH_INDEX: ${SEARCH_ELASTICSEARCH_INDEX:-posts}
  SEED_POST_COUNT: ${SEED_POST_COUNT:-5000}
  SEED_OUTPUT_DIR: /load-tests/seed_data

services:
  search-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: loadtest-search-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP:-512m} -Xmx${ES_HEAP:-512m}
      - cluster.name=loadtest-search-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:${SEARCH_ES_INT_PORT:-9200} >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${ES_MEM:-1G}
        reservations:
          memory: 512M

  search-redis:
    image: redis:7-alpine
    container_name: loadtest-search-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - ${REDIS_MEM:-256mb}
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM:-384M}
        reservations:
          memory: 128M

  search-seed:
    image: node:20-alpine
    container_name: loadtest-search-seed
    restart: "no"
    environment: *search-seed-env
    depends_on:
      search-es:
        condition: service_healthy
    volumes:
      - ./seed.mjs:/load-tests/seed.mjs:ro
      - ./k6/seed_data:/load-tests/seed_data:rw
    working_dir: /load-tests
    networks:
      - loadtest-net

  search-api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    container_name: loadtest-search-api
    restart: unless-stopped
    environment: *search-api-env
    depends_on:
      search-es:
        condition: service_healthy
      search-redis:
        condition: service_healthy
      search-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:${SEARCH_API_INT_PORT:-4003}/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${SVC_MEM:-512M}
        reservations:
          memory: 256M

  k6:
    image: grafana/k6:latest
    container_name: loadtest-k6
    restart: "no"
    command: ["run", "--summary-trend-stats=avg,med,p(90),p(95),p(99),max", "/load-tests/k6/${SCRIPT:-search}.js"]
    environment:
      TARGET: http://search-api:${SEARCH_API_INT_PORT:-4003}
      VUS: ${VUS:-20}
      DURATION: ${DURATION:-30s}
      RPS: ${RPS:-50}
      SEED_DIR: /load-tests/seed_data
    depends_on:
      search-api:
        condition: service_healthy
    volumes:
      - ./k6:/load-tests/k6:ro
      - ./k6/seed_data:/load-tests/seed_data:ro
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${K6_MEM:-384M}
        reservations:
          memory: 64M

networks:
  loadtest-net:
    name: loadtest-net
    driver: bridge
