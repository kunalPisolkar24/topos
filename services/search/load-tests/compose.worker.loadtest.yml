name: topos-search-worker-loadtest

x-worker-env: &worker-env
  NODE_ENV: production
  LOG_LEVEL: info
  ELASTICSEARCH_URL: http://search-es:${SEARCH_ES_INT_PORT:-9200}
  ELASTICSEARCH_INDEX: ${SEARCH_ELASTICSEARCH_INDEX:-posts}
  ES_TLS_REJECT_UNAUTHORIZED: false
  ES_REFRESH_POLICY: false
  ES_REQUEST_TIMEOUT_MS: ${SEARCH_ES_REQUEST_TIMEOUT_MS:-30000}
  ES_MAX_RETRIES: ${SEARCH_ES_MAX_RETRIES:-3}
  BULK_CHUNK_SIZE: ${SEARCH_BULK_CHUNK_SIZE:-1000}
  REDIS_URL: redis://dummy:6379
  CACHE_DEFAULT_TTL_SECONDS: ${SEARCH_CACHE_DEFAULT_TTL_SECONDS:-120}
  MAX_QUERY_LENGTH: ${SEARCH_MAX_QUERY_LENGTH:-512}
  SHUTDOWN_TIMEOUT_MS: ${SEARCH_SHUTDOWN_TIMEOUT_MS:-15000}
  SERVICE_NAME: ${SEARCH_SERVICE_NAME:-search-worker}
  SERVICE_VERSION: ${SEARCH_SERVICE_VERSION:-0.0.0}
  HTTP_BODY_LIMIT_KB: ${SEARCH_HTTP_BODY_LIMIT_KB:-256}
  HTTP_TRUST_PROXY: false
  METRICS_BASIC_AUTH: ${SEARCH_METRICS_BASIC_AUTH:-dummy:dummy}
  KAFKA_BROKER: kafka:9092
  KAFKA_CLIENT_ID: ${SEARCH_KAFKA_CLIENT_ID:-search-loadtest}
  KAFKA_GROUP_ID: ${SEARCH_KAFKA_GROUP_ID:-search-workers-loadtest}
  TOPIC_POSTS: ${SEARCH_TOPIC_POSTS:-posts}
  TOPIC_DLQ: ${SEARCH_TOPIC_DLQ:-posts.dlq}
  KAFKA_FROM_BEGINNING: true
  KAFKA_PARTITIONS_CONCURRENT: ${LOADGEN_PARTITIONS:-3}
  KAFKA_SESSION_TIMEOUT_MS: ${SEARCH_KAFKA_SESSION_TIMEOUT_MS:-30000}
  KAFKA_HEARTBEAT_INTERVAL_MS: ${SEARCH_KAFKA_HEARTBEAT_INTERVAL_MS:-3000}
  WORKER_METRICS_PORT: ${SEARCH_WORKER_INT_PORT:-7091}

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: loadtest-worker-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: loadtest-cluster
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 10s
      start_period: 20s
      retries: 10
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${KAFKA_MEM:-1G}
        reservations:
          memory: 512M

  search-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: loadtest-worker-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP:-512m} -Xmx${ES_HEAP:-512m}
      - cluster.name=loadtest-worker-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:${SEARCH_ES_INT_PORT:-9200} >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${ES_MEM:-1G}
        reservations:
          memory: 512M

  search-worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    container_name: loadtest-worker
    restart: unless-stopped
    command: ["npm", "run", "start:worker"]
    environment:
      <<: *worker-env
    depends_on:
      kafka:
        condition: service_healthy
      search-es:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "-u", "dummy:dummy", "http://localhost:${SEARCH_WORKER_INT_PORT:-7091}/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      - loadtest-net
    deploy:
      resources:
        limits:
          memory: ${SVC_MEM:-512M}
        reservations:
          memory: 256M

  loadgen:
    build:
      context: ..
      dockerfile: Dockerfile
      target: runtime
    container_name: loadtest-worker-loadgen
    restart: "no"
    command: ["node", "/load-tests/producer.mjs"]
    environment:
      KAFKA_BROKER: kafka:9092
      TOPIC_POSTS: ${SEARCH_TOPIC_POSTS:-posts}
      TOPIC_DLQ: ${SEARCH_TOPIC_DLQ:-posts.dlq}
      RPS: ${LOADGEN_RPS:-100}
      DURATION: ${LOADGEN_DURATION:-30}
      MESSAGE_SIZE: ${LOADGEN_MESSAGE_SIZE:-medium}
      PARTITIONS: ${LOADGEN_PARTITIONS:-3}
      WORKER_TARGET: http://search-worker:${SEARCH_WORKER_INT_PORT:-7091}
      ELASTICSEARCH_URL: http://search-es:${SEARCH_ES_INT_PORT:-9200}
      ELASTICSEARCH_INDEX: ${SEARCH_ELASTICSEARCH_INDEX:-posts}
      OUTPUT_DIR: /load-tests/results
    depends_on:
      kafka:
        condition: service_healthy
      search-es:
        condition: service_healthy
      search-worker:
        condition: service_healthy
    volumes:
      - ./producer.mjs:/load-tests/producer.mjs:ro
      - ./k6/seed_data:/load-tests/results:rw
    networks:
      - loadtest-net

networks:
  loadtest-net:
    name: loadtest-net
    driver: bridge
