services:
  search-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: local-search-es
    restart: unless-stopped
    ports:
      - "${SEARCH_ES_EXT_PORT:-9200}:${SEARCH_ES_INT_PORT:-9200}"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=local-search-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - search_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:${SEARCH_ES_INT_PORT:-9200} >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  search-redis:
    image: redis:7.2-alpine
    container_name: local-search-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${SEARCH_REDIS_EXT_PORT:-6381}:6379"
    volumes:
      - search_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  search_es_data:
  search_redis_data:

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
