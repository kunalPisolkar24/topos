x-es-common: &es-common
  image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  restart: unless-stopped
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 65536
      hard: 65536
  networks:
    - app-network
  healthcheck:
    test: ["CMD-SHELL", "curl -s http://localhost:${SEARCH_ES_INT_PORT} >/dev/null || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
  deploy:
    resources:
      limits:
        memory: 2G
      reservations:
        memory: 1G

services:
  search-es01:
    <<: *es-common
    container_name: ${SEARCH_ES_01_CONTAINER}
    hostname: search-es01
    environment:
      - node.name=search-es01
      - cluster.name=search-cluster
      - cluster.initial_master_nodes=search-es01,search-es02,search-es03
      - discovery.seed_hosts=search-es02,search-es03
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "${SEARCH_ES_EXT_PORT}:${SEARCH_ES_INT_PORT}"
    volumes:
      - es_data_01:/usr/share/elasticsearch/data

  search-es02:
    <<: *es-common
    container_name: ${SEARCH_ES_02_CONTAINER}
    hostname: search-es02
    environment:
      - node.name=search-es02
      - cluster.name=search-cluster
      - cluster.initial_master_nodes=search-es01,search-es02,search-es03
      - discovery.seed_hosts=search-es01,search-es03
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es_data_02:/usr/share/elasticsearch/data

  search-es03:
    <<: *es-common
    container_name: ${SEARCH_ES_03_CONTAINER}
    hostname: search-es03
    environment:
      - node.name=search-es03
      - cluster.name=search-cluster
      - cluster.initial_master_nodes=search-es01,search-es02,search-es03
      - discovery.seed_hosts=search-es01,search-es02
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es_data_03:/usr/share/elasticsearch/data

  search-kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: ${SEARCH_KIBANA_CONTAINER}
    restart: unless-stopped
    ports:
      - "${SEARCH_KIBANA_EXT_PORT}:${SEARCH_KIBANA_INT_PORT}"
    environment:
      - ELASTICSEARCH_HOSTS=${SEARCH_ES_URL}
    networks:
      - app-network
    depends_on:
      search-es01:
        condition: service_healthy
      search-es02:
        condition: service_healthy
      search-es03:
        condition: service_healthy

volumes:
  es_data_01:
  es_data_02:
  es_data_03:

networks:
  app-network:
    external: true
    name: ${APP_NETWORK}