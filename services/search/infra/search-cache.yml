x-redis-common: &redis-common
  image: bitnami/redis:7.2
  restart: always
  networks:
    - app-network
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

x-sentinel-common: &sentinel-common
  image: bitnami/redis-sentinel:7.2
  restart: always
  networks:
    - app-network
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "26379", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
  deploy:
    resources:
      limits:
        memory: 256M
      reservations:
        memory: 128M
  depends_on:
    search-redis-master:
      condition: service_healthy
    search-redis-replica-1:
      condition: service_healthy
    search-redis-replica-2:
      condition: service_healthy

services:
  search-redis-master:
    <<: *redis-common
    container_name: ${SEARCH_REDIS_MASTER_CONTAINER}
    environment:
      - REDIS_REPLICATION_MODE=master
      - ALLOW_EMPTY_PASSWORD=yes

  search-redis-replica-1:
    <<: *redis-common
    container_name: ${SEARCH_REDIS_REPLICA_1_CONTAINER}
    environment:
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=${SEARCH_REDIS_MASTER_CONTAINER}
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      search-redis-master:
        condition: service_healthy

  search-redis-replica-2:
    <<: *redis-common
    container_name: ${SEARCH_REDIS_REPLICA_2_CONTAINER}
    environment:
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=${SEARCH_REDIS_MASTER_CONTAINER}
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      search-redis-master:
        condition: service_healthy

  search-redis-sentinel-1:
    <<: *sentinel-common
    container_name: ${SEARCH_REDIS_SENTINEL_1_CONTAINER}
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=${SEARCH_REDIS_MASTER_CONTAINER}
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=${SEARCH_REDIS_MASTER_NAME}
      - REDIS_SENTINEL_QUORUM=2

  search-redis-sentinel-2:
    <<: *sentinel-common
    container_name: ${SEARCH_REDIS_SENTINEL_2_CONTAINER}
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=${SEARCH_REDIS_MASTER_CONTAINER}
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=${SEARCH_REDIS_MASTER_NAME}
      - REDIS_SENTINEL_QUORUM=2

  search-redis-sentinel-3:
    <<: *sentinel-common
    container_name: ${SEARCH_REDIS_SENTINEL_3_CONTAINER}
    environment:
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=3000
      - REDIS_MASTER_HOST=${SEARCH_REDIS_MASTER_CONTAINER}
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=${SEARCH_REDIS_MASTER_NAME}
      - REDIS_SENTINEL_QUORUM=2

networks:
  app-network:
    name: ${APP_NETWORK}