extend schema @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key", "@shareable"])

type Post @key(fields: "id") {
  id: ID!
  title: String
  summary: String
  slug: String
  createdAt: String
  imageUrl: String
}

type SearchResult @shareable {
  hits: [Post!]!
  total: Int!
}

type Query {
  searchPosts(query: String!, page: Int = 1, limit: Int = 10): SearchResult!
}
