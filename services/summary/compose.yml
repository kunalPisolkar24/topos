services:
  summary-api:
    image: kunalpisolkar/blog-app:distilbart-1.0
    container_name: summary-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
    networks:
      - app-network

  summary-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: summary-worker
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./worker/.env
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
    labels:
      - co.elastic.logs/enabled=true