services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: local-kafka
    hostname: kafka-1
    ports:
      - "${KAFKA_EXT_PORT:-9092}:${KAFKA_INT_PORT:-9092}"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:${KAFKA_INT_PORT:-9092},CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:${KAFKA_INT_PORT:-9092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:${KAFKA_INT_PORT:-9092} --list"]
      interval: 10s
      timeout: 15s
      start_period: 20s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M

  init-kafka:
    image: apache/kafka:3.7.0
    container_name: local-init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command: |
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:${KAFKA_INT_PORT:-9092} --list
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:${KAFKA_INT_PORT:-9092} --create --if-not-exists --topic ${KAFKA_TOPIC:-posts} --replication-factor 1 --partitions 3
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:${KAFKA_INT_PORT:-9092} --list
      "
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: local-kafka-ui
    ports:
      - "${KAFKA_UI_EXT_PORT:-8080}:${KAFKA_UI_INT_PORT:-8080}"
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:${KAFKA_INT_PORT:-9092}
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - app-network
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:

networks:
  app-network:
    name: ${APP_NETWORK:-topos_local_network}
    driver: bridge
